services:
  - type: web
    name: bolao-copa-2026
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bolao-copa-db
          property: connectionString
      - key: ADMIN_PASSWORD
        value: copa2026

databases:
  - name: bolao-copa-db
    plan: free
